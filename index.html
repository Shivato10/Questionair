<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIB Electrophysiology Unit — System Advisor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#080c18;--bg1:#0b1222;--bg2:#0e1830;
  --surface:rgba(255,255,255,0.022);--surface-h:rgba(255,255,255,0.045);
  --border:rgba(255,255,255,0.055);--border-h:rgba(255,255,255,0.12);
  --accent:#2dd4bf;--accent2:#38bdf8;--accent-dim:rgba(45,212,191,0.12);
  --accent-border:rgba(45,212,191,0.25);
  --gold:#fbbf24;
  --txt:#e2e8f0;--txt2:#94a3b8;--txt3:#64748b;--txt4:#475569;
  --font:'DM Sans',system-ui,-apple-system,sans-serif;
}
html{font-size:16px}
body{
  min-height:100vh;font-family:var(--font);color:var(--txt);
  background:linear-gradient(170deg,var(--bg0) 0%,var(--bg1) 40%,var(--bg2) 100%);
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:700px;margin:0 auto;padding:28px 20px}

/* ── Header ── */
.hdr{text-align:center;margin-bottom:28px}
.badge{
  display:inline-flex;align-items:center;gap:8px;padding:6px 18px;
  background:var(--accent-dim);border:1px solid var(--accent-border);border-radius:100px;margin-bottom:12px;
}
.badge svg{width:20px;height:20px;stroke:var(--accent);fill:none;stroke-width:1.5}
.badge span{font-size:11.5px;letter-spacing:1.6px;text-transform:uppercase;color:var(--accent);font-weight:600}
.main-title{
  font-size:clamp(22px,4vw,28px);font-weight:700;
  background:linear-gradient(135deg,var(--txt),var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

/* ── Breadcrumbs ── */
.breadcrumbs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;justify-content:center}
.bc{
  display:flex;flex-direction:column;padding:5px 10px;
  background:var(--surface);border:1px solid rgba(255,255,255,0.035);border-radius:8px;max-width:210px;
}
.bc-q{font-size:10px;color:var(--txt4);line-height:1.3}
.bc-a{font-size:11px;color:var(--txt2);font-weight:500}

/* ── Question Card ── */
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:26px 24px;
  animation:fadeUp .35s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.step-label{font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:1.6px;margin-bottom:10px;font-weight:600}
.q-text{font-size:17px;font-weight:600;line-height:1.38;color:#f1f5f9;margin-bottom:4px}
.q-sub{font-size:13px;color:var(--txt3);line-height:1.5;margin-bottom:20px}
.options{display:flex;flex-direction:column;gap:7px}

/* ── Option Buttons ── */
.opt{
  display:flex;align-items:center;gap:12px;padding:11px 16px;width:100%;
  background:var(--surface);border:1px solid rgba(255,255,255,0.055);border-radius:10px;
  cursor:pointer;text-align:left;color:var(--txt);font-size:13.5px;font-family:var(--font);
  transition:all .15s ease;outline:none;
}
.opt:hover{background:var(--surface-h);border-color:var(--border-h)}
.opt.selected{background:rgba(45,212,191,0.07);border-color:var(--accent-border);color:var(--accent)}
.opt.nr-opt{color:var(--txt3);font-style:italic;border-color:rgba(255,255,255,0.03);background:rgba(255,255,255,0.008)}
.opt.nr-opt.selected{color:var(--accent);background:rgba(45,212,191,0.07);border-color:var(--accent-border);font-style:italic}
.radio,.check{
  width:18px;height:18px;flex-shrink:0;
  border:2px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;
  transition:all .15s ease;
}
.radio{border-radius:9px}
.check{border-radius:4px}
.opt.selected .radio,.opt.selected .check{border-color:var(--accent);background:var(--accent)}
.radio-dot{width:7px;height:7px;border-radius:4px;background:var(--bg1);display:none}
.opt.selected .radio-dot{display:block}
.check-mark{color:var(--bg1);font-size:11px;font-weight:700;display:none}
.opt.selected .check-mark{display:block}

/* ── Buttons ── */
.btn-go{
  display:flex;align-items:center;justify-content:center;gap:6px;width:100%;
  padding:11px 24px;margin-top:16px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:10px;font-size:14px;font-weight:600;color:var(--bg1);
  cursor:pointer;font-family:var(--font);transition:opacity .2s;
}
.btn-go:disabled{opacity:.3;cursor:default}
.btn-back{
  display:inline-flex;align-items:center;gap:6px;padding:8px 16px;margin-top:14px;
  background:none;border:1px solid rgba(255,255,255,0.06);border-radius:8px;
  color:var(--txt3);font-size:13px;cursor:pointer;font-family:var(--font);transition:all .15s;
}
.btn-back:hover{border-color:var(--border-h);color:var(--txt2)}
.btn-reset{
  display:inline-flex;align-items:center;gap:6px;padding:9px 24px;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:9px;
  color:var(--txt2);font-size:13px;cursor:pointer;font-family:var(--font);transition:all .15s;
}
.btn-reset:hover{background:rgba(255,255,255,0.08);color:var(--txt)}

/* ── Results ── */
.r-title{font-size:22px;font-weight:700;text-align:center;color:#f1f5f9;margin-bottom:4px}
.r-sub{font-size:13px;color:var(--txt3);text-align:center;margin-bottom:20px}
.summary{
  margin-bottom:20px;background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.04);
  border-radius:10px;padding:10px 14px;
}
.summary summary{font-size:12.5px;color:var(--accent);cursor:pointer;font-weight:500;list-style:none}
.summary summary::-webkit-details-marker{display:none}
.summary-list{margin-top:10px;display:flex;flex-direction:column;gap:5px}
.s-item{padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.s-q{font-size:10.5px;color:var(--txt4)}
.s-a{font-size:12px;color:var(--txt2);font-weight:500}

/* ── System Cards ── */
.sys-list{display:flex;flex-direction:column;gap:10px}
.sys{
  border-radius:14px;padding:16px 20px;cursor:pointer;transition:all .2s;
  animation:fadeUp .4s ease both;
}
.sys:nth-child(2){animation-delay:.05s}.sys:nth-child(3){animation-delay:.1s}
.sys:nth-child(4){animation-delay:.15s}.sys:nth-child(5){animation-delay:.2s}
.sys-top{background:rgba(45,212,191,0.05);border:1px solid var(--accent-border)}
.sys-other{background:var(--surface);border:1px solid rgba(255,255,255,0.045)}
.sys:hover{border-color:var(--border-h)}
.sys-header{display:flex;justify-content:space-between;align-items:flex-start;gap:14px}
.sys-info{flex:1}
.sys-name-row{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.sys-name{font-size:15px;font-weight:600}
.sys-name.top{color:var(--accent)}.sys-name.other{color:var(--txt)}
.sys-desc{font-size:12.5px;color:var(--txt2);margin:3px 0 9px}
.sys-prep{font-size:11px;color:var(--txt3);padding:3px 9px;background:rgba(255,255,255,0.03);border-radius:5px;white-space:nowrap;flex-shrink:0;align-self:flex-start}
.bar-wrap{display:flex;align-items:center;gap:8px}
.bar-bg{flex:1;max-width:180px;height:5px;background:rgba(255,255,255,0.05);border-radius:3px}
.bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
.bar-fill.top{background:linear-gradient(90deg,var(--accent),var(--accent2))}
.bar-fill.other{background:linear-gradient(90deg,#475569,#64748b)}
.bar-pct{font-size:12.5px;font-weight:700;min-width:36px}
.bar-pct.top{color:var(--accent)}.bar-pct.other{color:var(--txt2)}

/* ── Expanded Detail ── */
.sys-detail{margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.05);display:none}
.sys.expanded .sys-detail{display:block;animation:fadeUp .25s ease}
.sec-label{font-size:10.5px;text-transform:uppercase;letter-spacing:1.2px;color:var(--txt3);margin-bottom:6px;font-weight:600}
.reason-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.reason-tag{
  display:inline-flex;align-items:center;gap:4px;font-size:11.5px;padding:2.5px 9px;
  background:var(--accent-dim);border:1px solid rgba(45,212,191,0.14);border-radius:100px;color:var(--accent);
}
.reason-tag svg{width:12px;height:12px;stroke:var(--accent);fill:none;stroke-width:2.5}
.feat-line{font-size:12.5px;color:#cbd5e1;padding-left:10px;border-left:2px solid rgba(45,212,191,0.18);margin-bottom:4px}
.exp-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px 14px}
.exp-item{font-size:11.5px;color:var(--txt2);padding:1.5px 0}

@media(max-width:500px){
  .exp-grid{grid-template-columns:1fr}
  .sys-header{flex-direction:column;gap:6px}
  .sys-prep{align-self:flex-start}
}
</style>
</head>

/* ═══════════════════ SCORING ═══════════════════ */
function scoreSystem(sys,trail){
  let s=0,reasons=[];const all={};
  trail.forEach(t=>{all[t.qId]=t.value});
  const has=(q,v)=>{const a=all[q];if(!a)return false;return Array.isArray(a)?a.includes(v):a===v};
  const hasAny=(q,vs)=>vs.some(v=>has(q,v));
  const t=sys.tags,inc=v=>t.includes(v);

  if(has("start","slice")&&inc("slice")){s+=30;reasons.push("Supports acute brain slices")}else if(has("start","slice")&&!inc("slice"))s-=30;
  if(has("start","culture")&&inc("culture")){s+=30;reasons.push("Supports dissociated/cultured neurons")}else if(has("start","culture")&&!inc("culture"))s-=30;
  if(has("start","organoid")&&inc("organoid")){s+=30;reasons.push("Supports organoid recordings")}else if(has("start","organoid")&&!inc("organoid"))s-=15;
  if(has("start","in_vivo")&&inc("in_vivo")){s+=30;reasons.push("Supports in vivo recordings")}else if(has("start","in_vivo")&&!inc("in_vivo"))s-=25;
  if(has("slice_resolution","single_cell")&&inc("single_cell")){s+=20;reasons.push("Single-cell patch clamp")}
  if(has("slice_resolution","single_cell")&&inc("mea")&&!inc("patch_clamp"))s-=15;
  if(has("slice_resolution","population")&&inc("population")){s+=20;reasons.push("Population-level field recordings")}
  if(has("slice_resolution","population")&&inc("patch_clamp")&&!inc("mea"))s-=10;
  if(has("slice_resolution","both")){if(inc("single_cell"))s+=10;if(inc("population"))s+=10}
  if(has("generic_resolution","single_cell")&&inc("single_cell")){s+=18;reasons.push("Single-cell resolution")}
  if(has("generic_resolution","population")&&inc("population")){s+=18;reasons.push("Population-level recordings")}
  if(has("generic_resolution","two_photon")&&inc("two_photon")){s+=22;reasons.push("Two-photon imaging")}
  if(has("generic_resolution","screening")&&inc("high_throughput")){s+=22;reasons.push("High-throughput screening")}
  if(has("slice_patch_count","few")&&inc("dual_patch")&&!inc("multi_patch")){s+=12;reasons.push("Optimized for paired recordings")}
  if(has("slice_patch_count","many")&&inc("multi_patch")){s+=25;reasons.push("8 simultaneous recordings")}
  if(has("slice_patch_count","many")&&!inc("multi_patch")&&inc("patch_clamp"))s-=5;
  if(has("slice_opto","directed")&&inc("directed_opto")){s+=18;reasons.push("Scanner-based directed optogenetics")}
  if(has("slice_opto","widefield")&&inc("widefield_opto")){s+=18;reasons.push("Widefield LED optogenetics")}
  if(has("slice_opto","holographic")&&inc("holographic")){s+=22;reasons.push("SLM holographic optogenetics")}
  if(has("slice_opto","directed")&&inc("holographic")){s+=10;reasons.push("Holographic exceeds directed precision")}
  if(hasAny("slice_opto_imaging",["calcium"])&&inc("calcium_imaging")){s+=15;reasons.push("Calcium/fluorescence imaging")}
  if(hasAny("slice_opto_imaging",["two_photon"])&&inc("two_photon")){s+=20;reasons.push("Two-photon deep tissue imaging")}
  if(hasAny("slice_no_opto_imaging",["calcium"])&&inc("calcium_imaging")){s+=15;reasons.push("Calcium/fluorescence imaging")}
  if(hasAny("slice_no_opto_imaging",["two_photon"])&&inc("two_photon")){s+=20;reasons.push("Two-photon deep tissue imaging")}
  if(has("slice_2p_focus","2p_calcium")&&inc("two_photon"))s+=12;
  if(has("slice_2p_focus","2p_holographic")&&inc("holographic")){s+=15;reasons.push("Holographic 3D photostimulation")}
  if(has("slice_2p_focus","2p_spine")&&inc("uncaging")){s+=15;reasons.push("Spine imaging & glutamate uncaging")}
  if(has("slice_2p_focus","2p_deep")&&inc("deep_imaging")){s+=12;reasons.push("Deep tissue imaging")}
  if(has("slice_special","iontophoresis")&&inc("iontophoresis")){s+=22;reasons.push("Iontophoresis system available")}
  if(has("slice_special","plasticity_focus")&&inc("plasticity"))s+=10;
  if(has("slice_special","plasticity_focus")&&inc("ltp")){s+=15;reasons.push("Dedicated LTP/LTD protocols")}
  if(has("slice_special","human_tissue")&&inc("human_tissue")){s+=18;reasons.push("Human tissue recording capable")}
  if(has("slice_special","pharmacology")&&inc("pharmacology"))s+=8;
  if(has("multipatch_imaging","imaging_yes")&&inc("live_imaging")){s+=10;reasons.push("Live cell imaging with multi-patch")}
  if(has("multipatch_imaging","opto_yes")&&inc("optogenetics")&&inc("multi_patch")){s+=12;reasons.push("Optogenetics + multipatch")}
  if(has("multipatch_connectivity","motifs")&&inc("multi_patch")){s+=15;reasons.push("Higher-order motif analysis")}
  if(has("multipatch_connectivity","probability")&&inc("multi_patch"))s+=10;
  if(has("multipatch_connectivity","comparison")&&inc("human_tissue"))s+=10;
  if(has("slice_mea_density","standard")&&sys.id.startsWith("mea_")){s+=15;reasons.push("Standard 60-electrode MEA")}
  if(has("slice_mea_density","high_density")&&inc("hd_mea")&&inc("slice")){s+=18;reasons.push("High-density 4,096-electrode MEA")}
  if(has("slice_mea_focus","ltp_ltd")&&inc("ltp")){s+=14;reasons.push("LTP/LTD protocol support")}
  if(has("slice_mea_focus","epilepsy")&&inc("epilepsy")){s+=14;reasons.push("Epileptiform activity detection")}
  if(has("slice_mea_focus","oscillations")&&inc("oscillations")){s+=14;reasons.push("Network oscillation analysis")}
  if(has("slice_mea_focus","pharma")&&inc("pharmacology"))s+=10;
  if(has("slice_mea_tissue","organoid")&&inc("organoid")){s+=15;reasons.push("Organoid recording support")}
  if(has("slice_mea_tissue","retina")&&inc("retina")){s+=15;reasons.push("Retinal explant recordings")}
  if(has("slice_mea_tissue","organoid")&&inc("3d_recording")){s+=10;reasons.push("3D µNeedle electrodes")}
  if(has("culture_method","patch")&&inc("patch_clamp")&&inc("culture")){s+=15;reasons.push("Patch clamp for cultures")}
  if(has("culture_method","mea")&&inc("mea")&&inc("culture")){s+=15;reasons.push("MEA for cultures")}
  if(has("culture_patch_speed","fast")&&inc("fast_application")){s+=22;reasons.push("Fast millisecond solution exchange")}
  if(has("culture_patch_imaging","fast_imaging")&&inc("calcium_imaging")&&inc("culture")){s+=12;reasons.push("High-speed fluorescence imaging")}
  if(has("culture_cell_type","ipsc")&&inc("ipsc")){s+=10;reasons.push("iPSC neuron compatible")}
  if(has("culture_cell_type","hek")&&inc("hek")){s+=10;reasons.push("HEK/CHO expression systems")}
  if(has("culture_cell_type","cardio")&&inc("cardiomyocyte")){s+=15;reasons.push("Cardiomyocyte recordings")}
  if(has("culture_mea_throughput","high")&&inc("high_throughput")){s+=18;reasons.push("High-throughput multi-well platform")}
  if(has("culture_mea_focus","drug_screen")&&inc("drug_discovery")){s+=14;reasons.push("Drug screening capability")}
  if(has("culture_mea_focus","longitudinal")&&inc("longitudinal")){s+=12;reasons.push("Long-term longitudinal recordings")}
  if(has("culture_mea_focus","axonal")&&inc("axonal_velocity")){s+=14;reasons.push("Axonal conduction velocity tracking")}
  if(has("culture_mea_focus","ipsc_qc")&&inc("ipsc")){s+=12;reasons.push("iPSC maturation assessment")}
  if(has("organoid_features","3d_needles")&&inc("3d_recording")){s+=18;reasons.push("3D µNeedle penetrating electrodes")}
  if(has("organoid_features","multi_well")&&inc("high_throughput")){s+=14;reasons.push("Multi-well parallel recording")}
  if(has("organoid_features","longitudinal")&&inc("longitudinal")){s+=12;reasons.push("Longitudinal monitoring")}
  if(has("organoid_scale","high")&&inc("high_throughput"))s+=12;
  if(has("organoid_scale","detailed")&&inc("hd_mea"))s+=10;
  if(has("invivo_focus","2p_invivo")&&inc("two_photon")){s+=18;reasons.push("In vivo two-photon imaging")}
  if(has("invivo_focus","holo_invivo")&&inc("holographic")){s+=20;reasons.push("In vivo holographic optogenetics")}
  if(has("invivo_focus","ephys_2p")&&inc("two_photon")&&inc("patch_clamp")){s+=18;reasons.push("Combined ephys + 2P imaging")}
  if(has("invivo_opto","holographic")&&inc("holographic"))s+=15;
  if(has("invivo_opto","widefield")&&inc("widefield_opto"))s+=10;
  if(has("generic_feature","opto")&&inc("optogenetics")){s+=10;reasons.push("Optogenetics available")}
  if(has("generic_feature","imaging")&&inc("imaging")){s+=10;reasons.push("Concurrent imaging")}
  if(has("generic_feature","pharma")&&inc("pharmacology"))s+=8;
  if(has("generic_feature","plasticity")&&(inc("plasticity")||inc("ltp"))){s+=10;reasons.push("Plasticity study capable")}
  if(has("generic_feature","connectivity")&&(inc("connectivity")||inc("multi_patch"))){s+=12;reasons.push("Connectivity mapping")}
  if(has("generic_goal","drug")&&(inc("drug_discovery")||inc("screening"))){s+=12;reasons.push("Drug discovery platform")}
  if(has("generic_goal","disease")&&(inc("ipsc")||inc("human_tissue")))s+=10;
  return{score:Math.max(s,0),reasons:[...new Set(reasons)]};
}

/* ═══════════════════ STATE ═══════════════════ */
let trail=[], currentQId="start", showResults=false, expandedId=null, tempMulti=[];

function getLabel(qId,val){
  const q=Q[qId];if(!q)return val;
  if(Array.isArray(val))return val.map(v=>q.options.find(o=>o.value===v)?.label||v).join(", ");
  return q.options.find(o=>o.value===val)?.label||val;
}

/* ═══════════════════ RENDER ═══════════════════ */
function render(){
  const app=document.getElementById("app");
  if(showResults){app.innerHTML=renderResults();bindResults();return;}
  app.innerHTML=renderQuestion();bindQuestion();
}

function headerHTML(){
  return `<div class="hdr"><div class="badge">${ico.beaker}<span>VIB Electrophysiology Unit</span></div><h1 class="main-title">System Advisor</h1></div>`;
}

function renderQuestion(){
  const q=Q[currentQId], isMulti=q.type==="multi";
  let bc="";
  if(trail.length>0){
    bc='<div class="breadcrumbs">'+trail.slice(-3).map(t=>{
      const qo=Q[t.qId];if(!qo)return"";
      const qTxt=qo.text.split("?")[0].substring(0,38)+"…";
      const aRaw=Array.isArray(t.value)?t.value.join(", "):t.value;
      return `<div class="bc"><span class="bc-q">${qTxt}</span><span class="bc-a">${aRaw.substring(0,28)}</span></div>`;
    }).join("")+"</div>";
  }
  const opts=q.options.map((o,i)=>{
    const nr=o.value==="nr";
    const sel=isMulti&&tempMulti.includes(o.value);
    const cls=["opt"];if(sel)cls.push("selected");if(nr)cls.push("nr-opt");
    const indicator=isMulti
      ?`<div class="check"><span class="check-mark">✓</span></div>`
      :`<div class="radio"><div class="radio-dot"></div></div>`;
    return `<button class="${cls.join(" ")}" data-idx="${i}" data-val="${o.value}">${indicator}${o.label}</button>`;
  }).join("");
  const goBtn=isMulti?`<button class="btn-go" id="goBtn" ${tempMulti.length===0?"disabled":""}>Continue ${ico.arrowR}</button>`:"";
  const backBtn=trail.length>0?`<button class="btn-back" id="backBtn">${ico.arrowL} Previous question</button>`:"";
  return `${headerHTML()}${bc}<div class="card"><div class="step-label">Step ${trail.length+1}</div><h2 class="q-text">${q.text}</h2><p class="q-sub">${q.subtitle}</p><div class="options">${opts}</div>${goBtn}</div>${backBtn}`;
}

function renderResults(){
  const results=SYSTEMS.map(sys=>({...sys,...scoreSystem(sys,trail)})).filter(r=>r.score>0).sort((a,b)=>b.score-a.score);
  const mx=results.length>0?results[0].score:1;

  const summaryItems=trail.map(t=>{
    const qo=Q[t.qId];if(!qo)return"";
    return `<div class="s-item"><span class="s-q">${qo.text}</span><br><span class="s-a">${getLabel(t.qId,t.value)}</span></div>`;
  }).join("");

  const cards=results.map((sys,idx)=>{
    const pct=Math.round((sys.score/mx)*100);
    const top=idx===0;
    const exp=expandedId===sys.id;
    const reasonsHTML=sys.reasons.length>0?`<div style="margin-bottom:14px"><div class="sec-label">Why this matches</div><div class="reason-tags">${sys.reasons.map(r=>`<span class="reason-tag">${ico.check} ${r}</span>`).join("")}</div></div>`:"";
    const featsHTML=`<div style="margin-bottom:14px"><div class="sec-label">Key features</div>${sys.highlights.map(h=>`<div class="feat-line">${h}</div>`).join("")}</div>`;
    const expsHTML=`<div><div class="sec-label">Experiments possible</div><div class="exp-grid">${sys.experiments.map(e=>`<div class="exp-item">· ${e}</div>`).join("")}</div></div>`;
    return `<div class="sys ${top?"sys-top":"sys-other"} ${exp?"expanded":""}" data-sysid="${sys.id}">
      <div class="sys-header"><div class="sys-info">
        <div class="sys-name-row">${top?`<span style="color:var(--gold)">${ico.star}</span>`:""}<span class="sys-name ${top?"top":"other"}">${sys.name}</span></div>
        <p class="sys-desc">${sys.shortDesc}</p>
        <div class="bar-wrap"><div class="bar-bg"><div class="bar-fill ${top?"top":"other"}" style="width:${pct}%"></div></div><span class="bar-pct ${top?"top":"other"}">${pct}%</span></div>
      </div><div class="sys-prep">${sys.prep}</div></div>
      <div class="sys-detail">${reasonsHTML}${featsHTML}${expsHTML}</div>
    </div>`;
  }).join("");

  return `${headerHTML()}<h2 class="r-title">Recommended Systems</h2><p class="r-sub">Based on your ${trail.length} answers, ranked by match strength</p>
    <details class="summary"><summary>▸ View your answers</summary><div class="summary-list">${summaryItems}</div></details>
    ${results.length===0?'<div style="text-align:center;padding:40px;color:var(--txt3)">No systems matched. Try broadening your answers.</div>':`<div class="sys-list">${cards}</div>`}
    <div style="text-align:center;margin-top:24px"><button class="btn-reset" id="resetBtn">${ico.reset} Start Over</button></div>`;
}

/* ═══════════════════ BINDINGS ═══════════════════ */
function bindQuestion(){
  const q=Q[currentQId], isMulti=q.type==="multi";
  document.querySelectorAll(".opt").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const val=btn.dataset.val;
      if(isMulti){
        if(val==="nr"){tempMulti=["nr"];}
        else{tempMulti=tempMulti.filter(v=>v!=="nr");const i=tempMulti.indexOf(val);i>-1?tempMulti.splice(i,1):tempMulti.push(val);}
        render();
      }else{
        const opt=q.options.find(o=>o.value===val);
        trail.push({qId:q.id,value:val});tempMulti=[];
        if(opt.next==="RESULTS")showResults=true;else currentQId=opt.next;
        render();
      }
    });
  });
  const goBtn=document.getElementById("goBtn");
  if(goBtn)goBtn.addEventListener("click",()=>{
    if(tempMulti.length===0)return;
    trail.push({qId:q.id,value:[...tempMulti]});
    const next=q.options[0].next;tempMulti=[];
    if(next==="RESULTS")showResults=true;else currentQId=next;
    render();
  });
  const backBtn=document.getElementById("backBtn");
  if(backBtn)backBtn.addEventListener("click",goBack);
}

function bindResults(){
  document.querySelectorAll(".sys").forEach(el=>{
    el.addEventListener("click",()=>{
      const id=el.dataset.sysid;
      expandedId=expandedId===id?null:id;render();
    });
  });
  const rb=document.getElementById("resetBtn");
  if(rb)rb.addEventListener("click",resetAll);
}

function goBack(){
  if(trail.length===0)return;
  trail=trail.slice(0,-1);tempMulti=[];showResults=false;
  if(trail.length===0){currentQId="start";render();return;}
  const last=trail[trail.length-1],lq=Q[last.qId];
  if(lq.type==="single"){const c=lq.options.find(o=>o.value===last.value);currentQId=c?c.next:"start";}
  else currentQId=lq.options[0].next;
  render();
}
function resetAll(){trail=[];currentQId="start";showResults=false;expandedId=null;tempMulti=[];render();}

/* ═══════════════════ INIT ═══════════════════ */
render();
</script>
</body>
</html>
